<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#4F46E5"/>
  <title>在庫管理 - ログイン</title>

  <!-- Bootstrap (CDN → fallback lokal) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        onerror="this.onerror=null;this.href='vendor/bootstrap.min.css'"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"
        onerror="this.onerror=null;this.href='vendor/bootstrap-icons.css'"/>

  <link rel="stylesheet" href="styles.css"/>

  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=1">
  <link rel="shortcut icon" href="icons/favicon.ico?v=1">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest" crossorigin="use-credentials">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ─── LOGIN PAGE (single column, soft gradient background) ─── */
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(99,102,241,.14), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(139,92,246,.12), transparent 45%),
        radial-gradient(circle at 90% 10%, rgba(14,165,233,.08), transparent 40%),
        var(--app-bg);
      overflow-x: hidden;
    }

    /* faint dot pattern overlay for subtle texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at center, rgba(79,70,229,.08) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .login-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 40px 36px 32px;
      box-shadow:
        0 1px 2px rgba(15,23,42,.04),
        0 20px 50px rgba(15,23,42,.10),
        0 4px 12px rgba(99,102,241,.06);
      border: 1px solid var(--border);
      position: relative;
    }

    /* tiny color accent strip at top of card */
    .login-card::before {
      content: '';
      position: absolute;
      left: 28px; right: 28px; top: 0;
      height: 3px;
      background: linear-gradient(90deg, #4F46E5, #8B5CF6, #EC4899);
      border-radius: 0 0 3px 3px;
    }

    /* Brand mark above title */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .login-brand .logo-square {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4F46E5, #8B5CF6);
      color: #fff; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 8px 20px rgba(79,70,229,.30);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .login-brand .lb-text {
      line-height: 1.2;
    }
    .login-brand .lb-name {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
      font-weight: 700;
      color: var(--text-primary);
      font-size: 1rem;
      letter-spacing: -0.01em;
    }
    .login-brand .lb-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .login-card h3 {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
      font-weight: 700;
      color: var(--text-primary);
      font-size: 1.625rem;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .login-card .sub {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin: 6px 0 26px;
    }

    .qr-link {
      font-size: 0.8125rem !important;
      font-weight: 600 !important;
      color: var(--brand) !important;
      text-decoration: none !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      transition: var(--transition);
    }
    .qr-link:hover { background: var(--brand-soft); }

    .form-control {
      height: 44px !important;
      min-height: 44px !important;
    }

    #btn-login {
      width: 100%;
      height: 46px;
      font-weight: 600 !important;
      font-size: 0.9375rem !important;
      border-radius: var(--r-sm) !important;
      justify-content: center;
    }
    #btn-qr-alt {
      width: 100%;
      justify-content: center;
    }

    /* QR scanner */
    #qr-area {
      display: none;
      width: 100%;
      border-radius: var(--r);
      overflow: hidden;
      margin-top: 16px;
      aspect-ratio: 1/1;
      max-width: 320px;
      margin-left: auto; margin-right: auto;
    }

    #global-loading { pointer-events: none !important; }

    .login-footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 22px;
    }

    /* mobile tweaks */
    @media (max-width: 540px) {
      .login-card { padding: 32px 24px 26px; border-radius: var(--r-lg); }
      .login-card h3 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">

      <!-- brand mark -->
      <div class="login-brand">
        <div class="logo-square">在</div>
        <div class="lb-text">
          <div class="lb-name">在庫管理 System</div>
          <div class="lb-sub">Inventory Management</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-1">
        <h3 class="m-0">ログイン</h3>
        <a id="btn-qr" href="#" class="qr-link"><i class="bi bi-qr-code-scan"></i> QR ログイン</a>
      </div>
      <p class="sub">ユーザーID か QR でログインできます。</p>

      <form id="login-form" autocomplete="on">
        <div class="mb-3">
          <label class="form-label">ユーザーID</label>
          <input id="login-user" class="form-control" placeholder="USER001" autocomplete="username" required/>
        </div>
        <div class="mb-4">
          <label class="form-label">パスコード</label>
          <input id="login-pin" class="form-control" placeholder="PIN" type="password" autocomplete="current-password"/>
        </div>

        <div class="d-flex flex-column gap-2">
          <button id="btn-login" type="submit" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-1"></i> ログイン
          </button>
          <button id="btn-qr-alt" type="button" class="btn btn-outline-secondary d-none">
            <i class="bi bi-qr-code-scan me-1"></i> QR ログイン
          </button>
        </div>
      </form>

      <div id="install-prompt" class="alert alert-primary mt-3 d-none align-items-center justify-content-between" role="alert">
        <div class="small"><i class="bi bi-phone me-1"></i> アプリをインストール</div>
        <button id="btn-install-app" class="btn btn-sm btn-light fw-bold" type="button">Install</button>
      </div>

      <!-- Area kamera QR -->
      <div id="qr-area" class="mt-3" aria-label="QR Scanner"></div>

      <div class="login-footer">
        © <span id="fy2"></span> &mdash; Design by <b>Wahyu</b>
      </div>
    </div>
  </div>

  <!-- JS libs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          onerror="this.onerror=null;this.src='vendor/bootstrap.bundle.min.js'"></script>

  <!-- html5-qrcode (before login.js) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <!-- Config -->
  <script src="./config.js"></script>

  <!-- Login logic -->
  <script src="./login.js"></script>

  <script>
    document.getElementById('fy2').textContent = new Date().getFullYear();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker terdaftar:', reg.scope))
          .catch((err) => console.log('Service Worker gagal:', err));
      });
    }
  </script>
</body>
</html>
