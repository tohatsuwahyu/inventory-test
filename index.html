<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>在庫管理 - ログイン</title>

  <!-- Bootstrap (CDN → fallback lokal) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        onerror="this.onerror=null;this.href='vendor/bootstrap.min.css'"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"
        onerror="this.onerror=null;this.href='vendor/bootstrap-icons.css'"/>

  <link rel="stylesheet" href="styles.css"/>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=1">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=1">
<link rel="shortcut icon" href="icons/favicon.ico?v=1">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest" crossorigin="use-credentials">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { 
    background-color: #F8FAFC; 
    min-height: 100vh; 
    font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; 
  }
  .login-wrap { 
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; 
  }
  .login-card { 
    width: 100%; max-width: 420px; 
    border-radius: 24px; border: 1px solid #E2E8F0; 
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06); 
    background: #ffffff;
  }
  .login-card .card-body { padding: 48px 40px !important; }
  .login-card h3 { font-weight: 800; color: #0F172A; margin-bottom: 8px; letter-spacing: -0.5px; }
  .form-label { font-size: 0.85rem; font-weight: 600; color: #64748B; margin-bottom: 6px; }
  .form-control { 
    border-radius: 12px; padding: 14px 16px; border: 1px solid #CBD5E1; 
    font-size: 0.95rem; background-color: #F8FAFC; transition: all 0.2s;
  }
  .form-control:focus { 
    border-color: #4F46E5; background-color: #FFFFFF; 
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); 
  }
  .btn-primary { 
    background-color: #4F46E5; border: none; border-radius: 12px; 
    padding: 14px; font-weight: 700; font-size: 1rem; width: 100%; transition: 0.2s;
  }
  .btn-primary:hover { background-color: #4338CA; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(79, 70, 229, 0.2); }
  #qr-area { display: none; width: 100%; border-radius: 16px; overflow: hidden; margin-top: 20px; border: 2px dashed #CBD5E1; }
</style>
</head>
<body>
  <div class="container login-wrap">
    <div class="card login-card">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="m-0">ログイン</h3>
          <a id="btn-qr" href="#" class="small text-decoration-none"><i class="bi bi-qr-code-scan me-1"></i>QRログイン</a>
        </div>
        <p class="text-muted mb-4">ユーザーID か QR でログインできます。</p>

        <form id="login-form" autocomplete="on">
          <div class="mb-3">
            <label class="form-label">ユーザーID</label>
            <input id="login-user" class="form-control" placeholder="USER001" autocomplete="username" required/>
          </div>
          <div class="mb-4">
            <label class="form-label">パスコード</label>
            <input id="login-pin" class="form-control" placeholder="PIN" type="password" autocomplete="current-password"/>
          </div>

          <div class="d-flex gap-2">
            <button id="btn-qr-alt" type="button" class="btn btn-outline-secondary d-none">
              <i class="bi bi-qr-code-scan me-1"></i> QRログイン
            </button>
            <button id="btn-login" type="submit" class="btn btn-primary">
              <i class="bi bi-box-arrow-in-right me-1"></i> ログイン
            </button>
          </div>
  
        </form>
<div id="install-prompt" class="alert alert-primary mt-3 d-none align-items-center justify-content-between" role="alert">
  <div class="small"><i class="bi bi-phone me-1"></i> アプリをインストール</div>
  <button id="btn-install-app" class="btn btn-sm btn-light fw-bold" type="button">Install</button>
</div>
        <!-- Area kamera QR -->
        <div id="qr-area" class="mt-3" aria-label="QR Scanner"></div>

        <div class="text-muted small mt-4">© wahyu</div>
      </div>
    </div>
  </div>

  <!-- JS libs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          onerror="this.onerror=null;this.src='vendor/bootstrap.bundle.min.js'"></script>

  <!-- html5-qrcode sebelum login.js -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <!-- Konfigurasi GAS -->
  <script src="./config.js"></script>

  <!-- Script login -->
  <script src="./login.js"></script>

  <footer class="app-footer text-center my-3">
    © <span id="fy2"></span> — Design by <b>Wahyu</b>
  </footer>
  <script>document.getElementById('fy2').textContent=new Date().getFullYear();</script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker terdaftar:', reg.scope))
        .catch((err) => console.log('Service Worker gagal:', err));
    });
  }
</script>
</body>
</html>
